<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>WalkieTALK PRO | Clover Tech</title>
  <style>
    :root { --primary: #2563eb; --danger: #ef4444; --bg: #0f172a; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    
    body {
      background: var(--bg);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .app-container {
      width: 100%;
      max-width: 400px;
      height: 90vh;
      background: #1e293b;
      border-radius: 2rem;
      display: flex;
      flex-direction: column;
      position: relative;
      border: 2px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    /* Header */
    .header {
      padding: 1.5rem;
      text-align: center;
      background: rgba(0,0,0,0.2);
      border-radius: 2rem 2rem 0 0;
    }

    /* Pantallas */
    .screen { padding: 2rem; display: none; flex-direction: column; height: 100%; }
    .active { display: flex; }

    /* Login */
    input {
      padding: 1rem;
      border-radius: 0.8rem;
      border: none;
      background: #0f172a;
      color: white;
      margin-bottom: 1rem;
      text-align: center;
      font-size: 1.1rem;
    }

    .btn {
      padding: 1rem;
      border-radius: 0.8rem;
      border: none;
      background: var(--primary);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    /* Walkie UI */
    .status-panel {
      display: flex;
      justify-content: space-between;
      background: #0f172a;
      padding: 1rem;
      border-radius: 1rem;
      margin-bottom: 1rem;
    }

    .led {
      width: 12px; height: 12px; border-radius: 50%;
      background: #334155; display: inline-block; margin-right: 5px;
    }
    .led.tx-active { background: #ff0000; box-shadow: 0 0 10px #ff0000; }
    .led.rx-active { background: #00ff00; box-shadow: 0 0 10px #00ff00; }

    .freq-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 5px;
      margin-bottom: 2rem;
    }

    .freq-btn {
      padding: 0.5rem;
      background: #334155;
      border: none;
      color: white;
      border-radius: 0.5rem;
      font-size: 0.7rem;
      cursor: pointer;
    }
    .freq-btn.active { background: var(--primary); }

    /* PTT Button */
    .ptt-wrapper {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .ptt-btn {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: var(--danger);
      border: 10px solid #991b1b;
      color: white;
      font-weight: bold;
      font-size: 1.2rem;
      cursor: pointer;
      user-select: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 0 #7f1d1d;
    }

    .ptt-btn:active {
      transform: translateY(5px);
      box-shadow: 0 5px 0 #7f1d1d;
      background: #b91c1c;
    }

    .ptt-btn.disabled { opacity: 0.3; pointer-events: none; }

    footer {
      padding: 1rem;
      font-size: 0.7rem;
      text-align: center;
      opacity: 0.5;
    }
  </style>
</head>
<body>

<div class="app-container">
  <div class="header">
    <h2>📡 WalkieTALK PRO</h2>
    <small id="userTag">Offline / Online Mode</small>
  </div>

  <div id="loginScreen" class="screen active">
    <input type="text" id="userCode" placeholder="Ingresa tu código (usuario1-10)">
    <button class="btn" onclick="app.login()">CONECTAR EQUIPO</button>
  </div>

  <div id="walkieScreen" class="screen">
    <div class="status-panel">
      <div><span id="ledTX" class="led"></span> <small>TX</small></div>
      <div><span id="ledRX" class="led"></span> <small>RX</small></div>
      <div><small>FREQ: </small><strong id="freqLabel">1</strong><small> MHz</small></div>
    </div>

    <div class="freq-grid" id="freqGrid"></div>

    <div class="ptt-wrapper">
      <div id="pttBtn" class="ptt-btn">
        <span>🎤</span>
        <br>
        <span>HABLAR</span>
      </div>
      <p style="margin-top: 1.5rem; font-size: 0.8rem; color: #94a3b8;">Mantén presionado para transmitir</p>
    </div>

    <button class="btn" onclick="location.reload()" style="background: #475569; margin-top: 1rem;">CERRAR SESIÓN</button>
  </div>
  
  <footer>Clover Technology &copy; 2026</footer>
</div>

<script>
const app = {
    userFreqs: { usuario1:1, usuario2:1, usuario3:2, usuario4:2, usuario5:3, usuario6:3, usuario7:4, usuario8:4, usuario9:5, usuario10:5 },
    currentFreq: 1,
    senderId: 'ID_' + Math.random().toString(36).substr(2, 9),
    channel: null,
    audioCtx: null,
    mediaRecorder: null,
    stream: null,

    initAudio() {
        if (!this.audioCtx) {
            this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
    },

    login() {
        const code = document.getElementById('userCode').value.toLowerCase().trim();
        if (this.userFreqs[code]) {
            this.currentFreq = this.userFreqs[code];
            document.getElementById('loginScreen').classList.remove('active');
            document.getElementById('walkieScreen').classList.add('active');
            document.getElementById('userTag').innerText = `Operador: ${code}`;
            this.setupWalkie();
        } else {
            alert("Código inválido. Intenta con usuario1 o usuario2");
        }
    },

    setupWalkie() {
        // Crear botones de frecuencia
        const grid = document.getElementById('freqGrid');
        for(let i=1; i<=5; i++) {
            const btn = document.createElement('button');
            btn.className = `freq-btn ${i === this.currentFreq ? 'active' : ''}`;
            btn.innerText = `${i} MHz`;
            btn.onclick = () => this.changeFreq(i);
            btn.id = `fbtn-${i}`;
            grid.appendChild(btn);
        }
        this.changeFreq(this.currentFreq);
        this.bindPTT();
    },

    changeFreq(f) {
        if (this.channel) this.channel.close();
        this.currentFreq = f;
        document.getElementById('freqLabel').innerText = f;
        document.querySelectorAll('.freq-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`fbtn-${f}`).classList.add('active');

        this.channel = new BroadcastChannel(`clover_freq_${f}`);
        this.channel.onmessage = (e) => this.handleIncomingAudio(e.data);
    },

    async handleIncomingAudio(data) {
        if (data.sender === this.senderId) return;
        this.initAudio();
        
        try {
            document.getElementById('ledRX').classList.add('rx-active');
            const buffer = await this.audioCtx.decodeAudioData(data.audio);
            const source = this.audioCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(this.audioCtx.destination);
            source.start();
            source.onended = () => document.getElementById('ledRX').classList.remove('rx-active');
        } catch (err) {
            console.error("Error al decodificar audio entrante");
        }
    },

    bindPTT() {
        const ptt = document.getElementById('pttBtn');
        const start = async (e) => {
            e.preventDefault();
            this.initAudio();
            this.startRecording();
        };
        const stop = (e) => {
            e.preventDefault();
            this.stopRecording();
        };

        ptt.addEventListener('mousedown', start);
        ptt.addEventListener('touchstart', start);
        ptt.addEventListener('mouseup', stop);
        ptt.addEventListener('touchend', stop);
        ptt.addEventListener('mouseleave', stop);
    },

    async startRecording() {
        try {
            this.stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            this.mediaRecorder = new MediaRecorder(this.stream);
            let chunks = [];

            this.mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) chunks.push(e.data);
            };

            this.mediaRecorder.onstop = async () => {
                const blob = new Blob(chunks, { type: 'audio/webm' });
                const arrayBuffer = await blob.arrayBuffer();
                this.channel.postMessage({
                    sender: this.senderId,
                    audio: arrayBuffer
                });
            };

            this.mediaRecorder.start();
            document.getElementById('ledTX').classList.add('tx-active');
        } catch (err) {
            alert("Debes permitir el acceso al micrófono para hablar.");
        }
    },

    stopRecording() {
        if (this.mediaRecorder && this.mediaRecorder.state !== 'inactive') {
            this.mediaRecorder.stop();
            this.stream.getTracks().forEach(track => track.stop());
            document.getElementById('ledTX').classList.remove('tx-active');
        }
    }
};
</script>
</body>
</html>
