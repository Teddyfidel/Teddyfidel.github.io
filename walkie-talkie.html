<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Walkie-Talkie PRO | Offline + Online</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      transition: background-color 0.2s ease, border-color 0.2s ease;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      background: linear-gradient(145deg, #0b1120 0%, #1a2639 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      color: white;
    }

    body.dark {
      background: linear-gradient(145deg, #030712 0%, #111827 100%);
    }

    .card {
      max-width: 600px;
      width: 100%;
      background: rgba(15, 25, 45, 0.85);
      backdrop-filter: blur(12px);
      border-radius: 3rem;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.2);
      overflow: hidden;
    }

    body.dark .card {
      background: rgba(5, 10, 25, 0.9);
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.1);
    }

    .header {
      padding: 1.2rem 1.8rem;
      background: rgba(0, 0, 0, 0.3);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      font-weight: 700;
      font-size: 1.4rem;
      letter-spacing: -0.5px;
      color: white;
    }

    .logo span {
      font-size: 1.6rem;
    }

    .dark-toggle {
      background: rgba(255, 255, 255, 0.15);
      border: none;
      border-radius: 2rem;
      width: 44px;
      height: 44px;
      cursor: pointer;
      font-size: 1.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      transition: 0.2s;
    }

    .dark-toggle:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: scale(0.96);
    }

    .content {
      padding: 1.8rem;
    }

    .login-screen {
      display: flex;
      flex-direction: column;
      gap: 1.8rem;
    }

    .login-title {
      font-size: 1.6rem;
      font-weight: 600;
      text-align: center;
      color: white;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    label {
      font-weight: 500;
      font-size: 0.9rem;
      color: #e2e8f0;
    }

    input {
      font-family: inherit;
      padding: 0.9rem 1rem;
      border-radius: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(0, 0, 0, 0.5);
      color: white;
      font-size: 1rem;
      outline: none;
    }

    input::placeholder {
      color: #cbd5e1;
    }

    input:focus {
      border-color: #3b82f6;
    }

    button {
      font-family: inherit;
      padding: 0.9rem 1rem;
      border-radius: 2rem;
      border: none;
      font-weight: 600;
      cursor: pointer;
      background: #2563eb;
      color: white;
      font-size: 1rem;
      transition: 0.2s;
    }

    button:hover {
      background: #1d4ed8;
      transform: scale(0.98);
    }

    .error-msg {
      color: #f87171;
      font-size: 0.8rem;
      text-align: center;
      background: rgba(220, 38, 38, 0.2);
      padding: 0.5rem;
      border-radius: 2rem;
    }

    .walkie-screen {
      display: flex;
      flex-direction: column;
      gap: 1.8rem;
    }

    .user-badge {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2rem;
      padding: 0.6rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 0.6rem;
      color: white;
    }

    .freq-selector {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 2rem;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .freq-selector label {
      color: white;
    }

    .freq-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
    }

    .freq-btn {
      flex: 1;
      min-width: 60px;
      background: rgba(30, 41, 59, 0.8);
      font-weight: 700;
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .freq-btn.active {
      background: #2563eb;
      color: white;
      box-shadow: 0 4px 10px rgba(37, 99, 235, 0.5);
      border-color: transparent;
    }

    .control-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: space-between;
    }

    .toggle-switch {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      background: rgba(0, 0, 0, 0.4);
      padding: 0.5rem 1rem;
      border-radius: 3rem;
      color: white;
    }

    .toggle-btn {
      background: #4b5563;
      border: none;
      width: 52px;
      height: 28px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      padding: 0 4px;
      cursor: pointer;
    }

    .toggle-btn.active {
      background: #10b981;
    }

    .toggle-knob {
      width: 22px;
      height: 22px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle-btn.active .toggle-knob {
      transform: translateX(24px);
    }

    .ptt-container {
      display: flex;
      justify-content: center;
      margin: 0.5rem 0;
    }

    .ptt-button {
      background: #dc2626;
      width: 110px;
      height: 110px;
      border-radius: 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: white;
      font-weight: bold;
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: 0 12px 20px rgba(0, 0, 0, 0.4);
      transition: 0.05s linear;
      user-select: none;
    }

    .ptt-button:active {
      transform: scale(0.94);
      background: #b91c1c;
    }

    .ptt-button.disabled {
      background: #6b7280;
      pointer-events: none;
      opacity: 0.6;
    }

    .status-area {
      background: rgba(0, 0, 0, 0.4);
      border-radius: 1.5rem;
      padding: 0.8rem;
      font-size: 0.8rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      color: white;
    }

    .led {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #6b7280;
      display: inline-block;
      margin-right: 6px;
    }

    .led.red {
      background: #ef4444;
      box-shadow: 0 0 6px #ef4444;
    }

    .led.green {
      background: #10b981;
      box-shadow: 0 0 6px #10b981;
    }

    .logout-btn {
      background: #475569;
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      font-size: 0.8rem;
    }

    footer {
      font-size: 0.7rem;
      text-align: center;
      padding: 1rem;
      opacity: 0.8;
      color: #e2e8f0;
    }

    .icon {
      font-size: 1.2rem;
      display: inline-block;
      margin-right: 0.3rem;
    }
  </style>
</head>
<body>
<div class="card" id="appRoot">
  <div class="header">
    <div class="logo">
      <span>📡</span>
      <span>WalkieTALK</span>
    </div>
    <button class="dark-toggle" id="darkModeToggleBtn">🌙</button>
  </div>
  <div class="content" id="mainContent">
    <!-- Pantalla Login -->
    <div id="loginScreen" class="login-screen">
      <div class="login-title">
        <span class="icon">🎤</span> Ingresa tu código
      </div>
      <div class="input-group">
        <label><span class="icon">🔑</span> Código de usuario</label>
        <input type="text" id="userCodeInput" placeholder="Código de usuario" autocomplete="off">
      </div>
      <button id="loginBtn"><span class="icon">📻</span> Conectar al equipo</button>
      <div id="loginError" class="error-msg" style="display: none;">Código inválido. Usa: usuario1 al usuario8</div>
      <footer>🔊 Comunicación real offline/online | Misma frecuencia</footer>
    </div>

    <!-- Pantalla Walkie Talkie -->
    <div id="walkieScreen" class="walkie-screen" style="display: none;">
      <div class="user-badge">
        <span><span class="icon">👤</span> <span id="loggedUserName"></span></span>
        <span><span class="icon">📶</span> Frecuencia: <strong id="currentFreqLabel">1</strong> MHz</span>
        <button id="logoutButton" class="logout-btn"><span class="icon">🚪</span> Salir</button>
      </div>

      <div class="freq-selector">
        <label><span class="icon">🎚️</span> Sintonizar frecuencia</label>
        <div class="freq-buttons" id="freqButtonsContainer"></div>
      </div>

      <div class="control-panel">
        <div class="toggle-switch">
          <span class="icon">🎙️</span> TX Power
          <div id="txToggle" class="toggle-btn active">
            <div class="toggle-knob"></div>
          </div>
        </div>
        <div class="toggle-switch">
          <span class="icon">🔌</span> Radio ON
          <div id="radioToggle" class="toggle-btn active">
            <div class="toggle-knob"></div>
          </div>
        </div>
      </div>

      <div class="ptt-container">
        <div id="pttButton" class="ptt-button">
          <span style="font-size: 2rem;">✋</span>
          <span>HABLAR</span>
        </div>
      </div>

      <div class="status-area">
        <div><span class="led" id="txLed"></span> TX <span id="txStatusText">Inactivo</span></div>
        <div><span class="led" id="rxLed"></span> RX <span id="rxStatusText">Esperando</span></div>
        <div><span class="icon">📡</span> <span id="connectionBadge">Frecuencia activa</span></div>
      </div>
      <footer style="padding-top:0">Mantén presionado "HABLAR" para transmitir 🎤</footer>
    </div>
  </div>
</div>

<script>
  // ======================== MAPEO DE USUARIOS A FRECUENCIA ========================
  const userFreqMap = {
    usuario1: 1, usuario2: 1,
    usuario3: 2, usuario4: 2,
    usuario5: 3, usuario6: 3,
    usuario7: 4, usuario8: 4,
    usuario9: 5, usuario10: 5
  };
  const VALID_USERS = Object.keys(userFreqMap);
  const TOTAL_FREQS = 5;

  // ======================== ESTADO GLOBAL ========================
  let currentUser = null;
  let currentFrequency = 1;
  let radioOn = true;
  let txEnabled = true;
  let mediaStream = null;
  let audioContext = null;
  let isPttActive = false;
  let mediaRecorder = null;
  let currentChannel = null;
  let senderId = null;
  let audioQueue = [];
  let isPlayingAudio = false;
  let currentAudioSource = null;

  // Elementos DOM
  const loginScreen = document.getElementById('loginScreen');
  const walkieScreen = document.getElementById('walkieScreen');
  const userCodeInput = document.getElementById('userCodeInput');
  const loginBtn = document.getElementById('loginBtn');
  const loginErrorDiv = document.getElementById('loginError');
  const logoutButton = document.getElementById('logoutButton');
  const loggedUserNameSpan = document.getElementById('loggedUserName');
  const currentFreqLabel = document.getElementById('currentFreqLabel');
  const freqButtonsContainer = document.getElementById('freqButtonsContainer');
  const txToggleDiv = document.getElementById('txToggle');
  const radioToggleDiv = document.getElementById('radioToggle');
  const pttButton = document.getElementById('pttButton');
  const txLed = document.getElementById('txLed');
  const txStatusText = document.getElementById('txStatusText');
  const rxLed = document.getElementById('rxLed');
  const rxStatusText = document.getElementById('rxStatusText');
  const darkModeBtn = document.getElementById('darkModeToggleBtn');

  // ======================== MODO OSCURO ========================
  function initDarkMode() {
    const isDark = localStorage.getItem('darkMode') === 'true';
    if (isDark) document.body.classList.add('dark');
    else document.body.classList.remove('dark');
  }
  darkModeBtn.addEventListener('click', () => {
    document.body.classList.toggle('dark');
    localStorage.setItem('darkMode', document.body.classList.contains('dark'));
  });
  initDarkMode();

  // ======================== AUDIO: MICRÓFONO Y REPRODUCCIÓN ========================
  async function getMicrophoneStream() {
    if (mediaStream && mediaStream.active) return mediaStream;
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaStream = stream;
      return stream;
    } catch (err) {
      console.error("Error micrófono:", err);
      alert("No se pudo acceder al micrófono. Permite el acceso para hablar.");
      return null;
    }
  }

  function initAudioContext() {
    if (!audioContext) {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioContext.state === 'suspended') {
      audioContext.resume();
    }
    return audioContext;
  }

  async function playAudioFragment(arrayBuffer) {
    if (!radioOn) return;
    if (!audioContext) initAudioContext();
    if (audioContext.state === 'suspended') await audioContext.resume();
    try {
      const audioBuffer = await audioContext.decodeAudioData(arrayBuffer.slice(0));
      audioQueue.push(audioBuffer);
      processAudioQueue();
    } catch (e) {
      console.warn("Error decodificando audio", e);
    }
  }

  async function processAudioQueue() {
    if (isPlayingAudio || audioQueue.length === 0) return;
    if (!radioOn) {
      audioQueue = [];
      return;
    }
    isPlayingAudio = true;
    const buffer = audioQueue.shift();
    if (!buffer) {
      isPlayingAudio = false;
      processAudioQueue();
      return;
    }
    if (!audioContext) initAudioContext();
    const source = audioContext.createBufferSource();
    source.buffer = buffer;
    source.connect(audioContext.destination);
    source.onended = () => {
      isPlayingAudio = false;
      processAudioQueue();
    };
    source.start();
    currentAudioSource = source;
    rxLed.className = "led green";
    rxStatusText.innerText = "Recibiendo voz";
    setTimeout(() => {
      if (!isPlayingAudio && audioQueue.length === 0) {
        rxLed.className = "led";
        rxStatusText.innerText = "En espera";
      }
    }, 300);
  }

  // ======================== COMUNICACIÓN POR BROADCASTCHANNEL (OFFLINE/ONLINE) ========================
  function closeChannel() {
    if (currentChannel) {
      currentChannel.close();
      currentChannel = null;
    }
  }

  function initChannelForFreq(freq) {
    closeChannel();
    const channelName = `walkie_freq_${freq}`;
    currentChannel = new BroadcastChannel(channelName);
    currentChannel.onmessage = (event) => {
      if (!radioOn) return;
      const { type, data, sender } = event.data;
      if (type === 'audio' && sender !== senderId) {
        playAudioFragment(data);
        rxLed.className = "led green";
        rxStatusText.innerText = "Recibiendo...";
        setTimeout(() => {
          if (!isPlayingAudio && audioQueue.length === 0) {
            rxLed.className = "led";
            rxStatusText.innerText = "En espera";
          }
        }, 500);
      }
    };
  }

  async function setFrequency(freq) {
    if (freq < 1 || freq > TOTAL_FREQS) return;
    currentFrequency = freq;
    currentFreqLabel.innerText = freq;
    document.querySelectorAll('.freq-btn').forEach(btn => {
      if (parseInt(btn.getAttribute('data-freq')) === freq) btn.classList.add('active');
      else btn.classList.remove('active');
    });
    if (isPttActive) stopTransmission();
    initChannelForFreq(currentFrequency);
  }

  // ======================== TRANSMISIÓN DE AUDIO (PTT) ========================
  async function startTransmission() {
    if (!radioOn || !txEnabled) return;
    if (isPttActive) return;
    const stream = await getMicrophoneStream();
    if (!stream) return;
    if (!audioContext || audioContext.state === 'suspended') {
      await initAudioContext().resume();
    }
    try {
      const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
      mediaRecorder = new MediaRecorder(stream, { mimeType });
      mediaRecorder.ondataavailable = (event) => {
        if (event.data && event.data.size > 0 && radioOn && txEnabled && currentChannel) {
          event.data.arrayBuffer().then(buffer => {
            if (currentChannel && radioOn) {
              currentChannel.postMessage({
                type: 'audio',
                data: buffer,
                sender: senderId
              });
            }
          });
        }
      };
      mediaRecorder.start(180);
      isPttActive = true;
      txLed.className = "led red";
      txStatusText.innerText = "Transmitiendo";
    } catch (err) {
      console.error("Error iniciando grabación", err);
    }
  }

  function stopTransmission() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop();
      mediaRecorder = null;
    }
    isPttActive = false;
    txLed.className = "led";
    txStatusText.innerText = "Inactivo";
  }

  // ======================== UI TOGGLES Y CONTROLES ========================
  function updateTxToggleUI() {
    if (txEnabled) txToggleDiv.classList.add('active');
    else txToggleDiv.classList.remove('active');
    if (!txEnabled && isPttActive) stopTransmission();
    updatePTTEnable();
  }

  function updateRadioToggleUI() {
    if (radioOn) {
      radioToggleDiv.classList.add('active');
    } else {
      radioToggleDiv.classList.remove('active');
      if (isPttActive) stopTransmission();
      audioQueue = [];
      if (currentAudioSource) {
        try { currentAudioSource.stop(); } catch(e) {}
        isPlayingAudio = false;
      }
      rxLed.className = "led";
      rxStatusText.innerText = "Radio OFF";
      txLed.className = "led";
      txStatusText.innerText = "Inactivo";
    }
    updatePTTEnable();
    if (radioOn) {
      rxStatusText.innerText = "En espera";
      initChannelForFreq(currentFrequency);
    } else {
      rxStatusText.innerText = "Radio OFF";
      closeChannel();
    }
  }

  function updatePTTEnable() {
    const canTalk = radioOn && txEnabled;
    if (canTalk) pttButton.classList.remove('disabled');
    else {
      pttButton.classList.add('disabled');
      if (isPttActive) stopTransmission();
    }
  }

  function attachPTTEvents() {
    const startHandler = (e) => {
      e.preventDefault();
      if (radioOn && txEnabled && !isPttActive) startTransmission();
    };
    const stopHandler = (e) => {
      e.preventDefault();
      if (isPttActive) stopTransmission();
    };
    pttButton.removeEventListener('mousedown', startHandler);
    pttButton.removeEventListener('mouseup', stopHandler);
    pttButton.removeEventListener('mouseleave', stopHandler);
    pttButton.addEventListener('mousedown', startHandler);
    pttButton.addEventListener('mouseup', stopHandler);
    pttButton.addEventListener('mouseleave', stopHandler);
    pttButton.addEventListener('touchstart', startHandler, { passive: false });
    pttButton.addEventListener('touchend', stopHandler);
    pttButton.addEventListener('touchcancel', stopHandler);
  }

  // ======================== LOGIN CON CÓDIGO ========================
  function handleLogin() {
    const rawCode = userCodeInput.value.trim().toLowerCase();
    if (!VALID_USERS.includes(rawCode)) {
      loginErrorDiv.style.display = 'block';
      return;
    }
    loginErrorDiv.style.display = 'none';
    const assignedFreq = userFreqMap[rawCode];
    currentUser = rawCode;
    loginScreen.style.display = 'none';
    walkieScreen.style.display = 'flex';
    initWalkieAfterLogin(currentUser, assignedFreq);
  }

  async function initWalkieAfterLogin(user, defaultFreq) {
    if (isPttActive) stopTransmission();
    if (mediaStream) {
      mediaStream.getTracks().forEach(t => t.stop());
      mediaStream = null;
    }
    if (audioContext) {
      await audioContext.close();
      audioContext = null;
    }
    audioQueue = [];
    isPlayingAudio = false;
    radioOn = true;
    txEnabled = true;
    currentFrequency = defaultFreq;
    senderId = 'user_' + Date.now() + '_' + Math.random() + '_' + user;

    freqButtonsContainer.innerHTML = '';
    for (let i = 1; i <= TOTAL_FREQS; i++) {
      const btn = document.createElement('button');
      btn.className = 'freq-btn';
      if (i === currentFrequency) btn.classList.add('active');
      btn.setAttribute('data-freq', i);
      btn.innerText = `${i} MHz`;
      btn.addEventListener('click', () => setFrequency(i));
      freqButtonsContainer.appendChild(btn);
    }

    initChannelForFreq(currentFrequency);
    await getMicrophoneStream();
    initAudioContext();

    loggedUserNameSpan.innerText = user;
    currentFreqLabel.innerText = currentFrequency;
    updateTxToggleUI();
    updateRadioToggleUI();
    attachPTTEvents();

    txToggleDiv.onclick = () => {
      txEnabled = !txEnabled;
      updateTxToggleUI();
    };
    radioToggleDiv.onclick = () => {
      radioOn = !radioOn;
      updateRadioToggleUI();
    };
  }

  // ======================== CERRAR SESIÓN ========================
  async function logout() {
    if (isPttActive) stopTransmission();
    if (mediaStream) {
      mediaStream.getTracks().forEach(track => track.stop());
      mediaStream = null;
    }
    closeChannel();
    if (audioContext) {
      await audioContext.close();
      audioContext = null;
    }
    audioQueue = [];
    isPlayingAudio = false;
    currentUser = null;
    loginScreen.style.display = 'flex';
    walkieScreen.style.display = 'none';
    userCodeInput.value = '';
  }

  // ======================== EVENTOS PRINCIPALES ========================
  loginBtn.addEventListener('click', handleLogin);
  logoutButton.addEventListener('click', logout);
  userCodeInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') handleLogin();
  });

  window.addEventListener('beforeunload', () => {
    if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
    if (currentChannel) currentChannel.close();
  });

  loginScreen.style.display = 'flex';
  walkieScreen.style.display = 'none';
</script>
</body>
</html>
