<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Walkie-Talkie PRO | Clover Tech</title>
  <style>
    /* Estilos optimizados y responsivos */
    * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.2s ease; }
    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      color: white;
    }
    body.dark { background: radial-gradient(circle at center, #020617 0%, #000000 100%); }
    .card {
      max-width: 450px;
      width: 100%;
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(16px);
      border-radius: 2.5rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }
    .header {
      padding: 1.5rem;
      background: rgba(0, 0, 0, 0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .content { padding: 2rem; }
    .input-group { margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; }
    input {
      padding: 1rem;
      border-radius: 1rem;
      border: 1px solid #475569;
      background: #0f172a;
      color: white;
      font-size: 1rem;
    }
    button {
      padding: 1rem;
      border-radius: 1rem;
      border: none;
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    button:active { transform: scale(0.98); }
    .freq-buttons { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.5rem; margin-top: 1rem; }
    .freq-btn { padding: 0.5rem; font-size: 0.8rem; background: #334155; border-radius: 0.5rem; }
    .freq-btn.active { background: #10b981; }
    .ptt-container { display: flex; justify-content: center; margin: 2rem 0; }
    .ptt-button {
      width: 140px; height: 140px; border-radius: 50%;
      background: #ef4444; border: 8px solid #991b1b;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; user-select: none; box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
    }
    .ptt-button:active { background: #b91c1c; transform: scale(0.95); box-shadow: none; }
    .ptt-button.disabled { background: #4b5563; border-color: #1f2937; cursor: not-allowed; }
    .led { width: 12px; height: 12px; border-radius: 50%; display: inline-block; background: #334155; }
    .led.red { background: #ef4444; box-shadow: 0 0 10px #ef4444; }
    .led.green { background: #10b981; box-shadow: 0 0 10px #10b981; }
    .status-bar { display: flex; justify-content: space-between; font-size: 0.8rem; background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 1rem; }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <div style="font-weight: bold;">📡 WalkieTALK PRO</div>
    <button id="darkModeBtn" style="padding: 5px 10px; background: transparent;">🌙</button>
  </div>

  <div class="content" id="loginScreen">
    <div class="input-group">
      <label>Código de Operador (usuario1 - usuario10)</label>
      <input type="text" id="userCode" placeholder="Escribe tu código...">
    </div>
    <button id="loginBtn" style="width: 100%;">INICIAR SISTEMA</button>
  </div>

  <div class="content" id="walkieScreen" style="display: none;">
    <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
      <span id="userNameDisplay">---</span>
      <button id="logoutBtn" style="padding: 5px 10px; background: #475569; font-size: 0.7rem;">SALIR</button>
    </div>

    <div class="status-bar">
      <div><span class="led" id="txLed"></span> TX</div>
      <div><span class="led" id="rxLed"></span> RX</div>
      <div>FRECUENCIA: <span id="freqLabel">1</span> MHz</div>
    </div>

    <div class="freq-buttons" id="freqContainer"></div>

    <div class="ptt-container">
      <div id="pttBtn" class="ptt-button">
        <span style="font-size: 2rem;">🎤</span>
        <span>HABLAR</span>
      </div>
    </div>

    <div style="text-align: center; font-size: 0.8rem; color: #94a3b8;">
      Push-To-Talk: Mantén presionado para transmitir
    </div>
  </div>
</div>

<script>
  // Configuración
  const userFreqMap = { usuario1:1, usuario2:1, usuario3:2, usuario4:2, usuario5:3, usuario6:3, usuario7:4, usuario8:4, usuario9:5, usuario10:5 };
  let currentUser = null, currentFreq = 1, senderId = 'ID_' + Math.random().toString(36).substr(2, 9);
  let channel, mediaRecorder, audioCtx;

  // Elementos
  const pttBtn = document.getElementById('pttBtn');
  const txLed = document.getElementById('txLed');
  const rxLed = document.getElementById('rxLed');

  // Inicializar Audio
  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  // Reproducir Audio Recibido
  async function playBuffer(arrayBuffer) {
    initAudio();
    try {
      const buffer = await audioCtx.decodeAudioData(arrayBuffer);
      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      source.connect(audioCtx.destination);
      source.start();
      rxLed.classList.add('green');
      source.onended = () => rxLed.classList.remove('green');
    } catch (e) { console.error("Error de audio:", e); }
  }

  // Sintonizar Canal (BroadcastChannel funciona Offline entre pestañas)
  function setChannel(freq) {
    if (channel) channel.close();
    currentFreq = freq;
    document.getElementById('freqLabel').innerText = freq;
    channel = new BroadcastChannel(`freq_ch_${freq}`);
    
    channel.onmessage = (e) => {
      if (e.data.sender !== senderId) {
        playBuffer(e.data.audio);
      }
    };

    // Actualizar UI botones
    document.querySelectorAll('.freq-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.freq == freq);
    });
  }

  // Transmisión (TX)
  async function startTX() {
    initAudio();
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      let chunks = [];
      
      mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
      
      mediaRecorder.onstop = async () => {
        const blob = new Blob(chunks, { type: 'audio/webm' });
        const buffer = await blob.arrayBuffer();
        channel.postMessage({ sender: senderId, audio: buffer });
        stream.getTracks().forEach(t => t.stop());
      };

      mediaRecorder.start();
      txLed.classList.add('red');
    } catch (err) { alert("Acceso al micro denegado"); }
  }

  function stopTX() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop();
      txLed.classList.remove('red');
    }
  }

  // Eventos PTT (Mouse y Touch)
  const events = {
    start: ['mousedown', 'touchstart'],
    stop: ['mouseup', 'mouseleave', 'touchend']
  };

  events.start.forEach(ev => pttBtn.addEventListener(ev, (e) => { e.preventDefault(); startTX(); }));
  events.stop.forEach(ev => pttBtn.addEventListener(ev, (e) => { e.preventDefault(); stopTX(); }));

  // Gestión de Login
  document.getElementById('loginBtn').onclick = () => {
    const code = document.getElementById('userCode').value.toLowerCase().trim();
    if (userFreqMap[code]) {
      currentUser = code;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('walkieScreen').style.display = 'block';
      document.getElementById('userNameDisplay').innerText = `Op: ${code}`;
      
      // Crear botones de frecuencia
      const container = document.getElementById('freqContainer');
      container.innerHTML = '';
      for(let i=1; i<=5; i++) {
        const b = document.createElement('button');
        b.className = 'freq-btn';
        b.innerText = `${i} MHz`;
        b.dataset.freq = i;
        b.onclick = () => setChannel(i);
        container.appendChild(b);
      }
      setChannel(userFreqMap[code]);
    } else {
      alert("Código inválido");
    }
  };

  document.getElementById('logoutBtn').onclick = () => location.reload();
  document.getElementById('darkModeBtn').onclick = () => document.body.classList.toggle('dark');
</script>
</body>
</html>
